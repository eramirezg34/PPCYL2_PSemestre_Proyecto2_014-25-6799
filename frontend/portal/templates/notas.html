{% extends 'base.html' %}

{% block sidebar_links %}
    <a href="/horarios/">📅 Horarios</a>
    <a href="/notas/">📝 Ingresar Notas</a>
    <a href="/reporte-notas/">📊 Reporte Notas</a>
{% endblock %}

{% block content %}
<h1>INGRESO DE NOTAS</h1>

{% if mensaje %}
<div class="alert">{{ mensaje }}</div>
{% endif %}

<div class="card">
    <form method="POST">
        {% csrf_token %}
        <button type="button" class="btn btn-primary"
            onclick="document.getElementById('fileInput').click()">
            📂 Cargar Archivo de Notas
        </button>
        <button type="submit" class="btn btn-success">💾 Procesar Notas</button>
        <input type="file" id="fileInput" accept=".xml" style="display:none"
            onchange="cargarArchivo(this)">
        <br><br>
        <textarea id="xmlInput" name="xml_content" rows="10"
            placeholder="<?xml version='1.0'?>"></textarea>
    </form>
</div>

<script>
function cargarArchivo(input) {
    const file = input.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('xmlInput').value = e.target.result;
        };
        reader.readAsText(file);
    }
}
</script>
{% endblock %}
