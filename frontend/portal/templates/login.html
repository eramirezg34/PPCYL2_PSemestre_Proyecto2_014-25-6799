<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcadNet - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #283593 50%, #1565c0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            display: flex;
            width: 850px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-left {
            flex: 1;
            background: linear-gradient(135deg, #1a237e, #1565c0);
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .login-left .logo {
            font-size: 42px;
            font-weight: 800;
            color: white;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .login-left .logo span { color: #90caf9; }

        .login-left .tagline {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            line-height: 1.6;
            margin-top: 15px;
        }

        .login-left .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .login-right {
            flex: 1;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-right h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1a237e;
            margin-bottom: 8px;
        }

        .login-right p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #c5cae9;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.2s;
            background: #f8f9ff;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1a237e;
            box-shadow: 0 0 0 3px rgba(26,35,126,0.1);
            background: white;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #1a237e, #1565c0);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26,35,126,0.3);
        }

        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 4px solid #c62828;
            font-size: 13px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .universidad {
            color: #999;
            font-size: 12px;
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <div class="icon">🎓</div>
            <div class="logo">Acad<span>Net</span></div>
            <div class="tagline">
                Plataforma educativa que conecta<br>
                estudiantes con tutores especializados
            </div>
        </div>
        <div class="login-right">
            <h2>Bienvenido</h2>
            <p>Ingresa tus credenciales para continuar</p>
            
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>👤 Usuario</label>
                    <input type="text" name="usuario" placeholder="Ingresa tu usuario" required>
                </div>
                <div class="form-group">
                    <label>🔒 Contraseña</label>
                    <input type="password" name="contrasenia" placeholder="Ingresa tu contraseña" required>
                </div>
                <button type="submit" class="btn-login">Iniciar Sesión →</button>
            </form>

            {% if error %}
            <div class="error-msg">⚠️ {{ error }}</div>
            {% endif %}

            <div class="universidad">
                Universidad Mariano Gálvez de Guatemala<br>
                PPCYL2-AcadNet © 2026
            </div>
        </div>
    </div>
</body>
</html>
